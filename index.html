<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧀 SOysdomofon - PVP Edition 🚪</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0e27;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(109, 40, 217, 0.3) 0px, transparent 50%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cheeseFloat {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-200px) rotate(360deg); opacity: 0; }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px currentColor, 0 0 40px currentColor; }
            50% { box-shadow: 0 0 40px currentColor, 0 0 80px currentColor; }
        }

        @keyframes orbit {
            from { transform: rotate(0deg) translateX(150px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(150px) rotate(-360deg); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes snow {
            0% { transform: translateY(-10vh); }
            100% { transform: translateY(110vh); }
        }

        @keyframes fadeChange {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes sauceAppear {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 1; }
        }

        @keyframes rankShine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* === AUTH SCREEN === */
        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.5);
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            animation: slideIn 0.6s ease;
        }

        .auth-logo h1 {
            font-size: 2.8em;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .auth-logo p {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 15px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #94a3b8;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #0a0e27;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #e2e8f0;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 16px;
            color: white;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #fbbf24;
            background: rgba(255, 255, 255, 0.08);
        }

        .auth-button {
            width: 100%;
            padding: 16px;
            border: none;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #0a0e27;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 10px 30px rgba(251, 191, 36, 0.3);
        }

        .auth-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(251, 191, 36, 0.5);
        }

        .error-message, .success-message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            animation: slideIn 0.3s ease;
            font-size: 14px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #86efac;
        }

        /* === GAME SCREEN === */
        .game-screen {
            display: none;
            padding: 20px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .header {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-left h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .header-left p {
            color: #94a3b8;
            font-weight: 300;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.3);
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.5);
        }

        .admin-btn {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.3);
        }

        .transfer-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.3);
        }

        .pvp-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.3);
            animation: pulse 2s infinite;
        }

        .global-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid #fbbf24;
            color: #fbbf24;
            padding: 50px 70px;
            border-radius: 30px;
            font-size: 2em;
            font-weight: 700;
            text-align: center;
            z-index: 10001;
            box-shadow: 0 30px 90px rgba(251, 191, 36, 0.5);
            max-width: 80%;
            animation: slideIn 0.5s ease;
        }

        .global-message .author {
            color: #f59e0b;
            font-size: 0.6em;
            margin-bottom: 15px;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.5);
            color: white;
            padding: 20px;
            border-radius: 15px;
            z-index: 10000;
            animation: slideIn 0.5s ease;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .notification.success {
            border-color: rgba(34, 197, 94, 0.5);
        }

        .notification.error {
            border-color: rgba(239, 68, 68, 0.5);
        }

        /* === PVP ARENA === */
        .pvp-arena {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 20000;
            display: none;
        }

        .pvp-arena.active {
            display: flex;
            flex-direction: column;
        }

        .pvp-header {
            padding: 30px;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 2px solid rgba(251, 191, 36, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pvp-player-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .pvp-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: 900;
        }

        .pvp-stats {
            text-align: left;
        }

        .pvp-name {
            font-size: 1.3em;
            font-weight: 700;
        }

        .pvp-hits {
            font-size: 2em;
            font-weight: 900;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pvp-battlefield {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .pvp-sauce {
            position: absolute;
            width: 80px;
            height: 80px;
            cursor: pointer;
            animation: sauceAppear 0.3s ease;
            transition: all 0.1s;
            font-size: 4em;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 20px currentColor);
        }

        .pvp-sauce:hover {
            transform: scale(1.2);
        }

        .pvp-sauce:active {
            transform: scale(0.9);
        }

        .pvp-timer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            font-weight: 900;
            color: #fbbf24;
            text-shadow: 0 0 30px #fbbf24;
            z-index: 1;
        }

        .pvp-result {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 60px;
            border-radius: 30px;
            text-align: center;
            border: 3px solid;
            z-index: 2;
        }

        .pvp-result.win {
            border-color: #10b981;
        }

        .pvp-result.lose {
            border-color: #ef4444;
        }

        .pvp-result h2 {
            font-size: 3em;
            margin-bottom: 20px;
            font-weight: 900;
        }

        .pvp-result.win h2 {
            color: #10b981;
        }

        .pvp-result.lose h2 {
            color: #ef4444;
        }

        .pvp-reward {
            font-size: 2em;
            margin: 20px 0;
            font-weight: 700;
            color: #fbbf24;
        }

        /* === RANK SYSTEM === */
        .rank-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9em;
            text-transform: uppercase;
            background-size: 200% auto;
            animation: rankShine 3s linear infinite;
        }

        .rank-novice { background: linear-gradient(90deg, #71717a, #a1a1aa, #71717a); }
        .rank-bronze { background: linear-gradient(90deg, #d97706, #f59e0b, #d97706); }
        .rank-silver { background: linear-gradient(90deg, #71717a, #d4d4d8, #71717a); }
        .rank-gold { background: linear-gradient(90deg, #f59e0b, #fbbf24, #f59e0b); }
        .rank-platinum { background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6); }
        .rank-diamond { background: linear-gradient(90deg, #06b6d4, #22d3ee, #06b6d4); }
        .rank-master { background: linear-gradient(90deg, #8b5cf6, #a78bfa, #8b5cf6); }
        .rank-grandmaster { background: linear-gradient(90deg, #ef4444, #f87171, #ef4444); }

        /* === EVENT EFFECTS === */
        .event-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 60px;
            border-radius: 30px;
            z-index: 9999;
            text-align: center;
            border: 3px solid;
            animation: slideIn 0.7s ease;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.8);
        }

        .event-icon {
            font-size: 6em;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .event-title {
            font-size: 2.5em;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .event-multiplier {
            font-size: 3.5em;
            font-weight: 900;
            color: #fbbf24;
            margin: 20px 0;
            animation: pulse 1s infinite;
        }

        .event-indicator {
            position: fixed;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 15px 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 9998;
            animation: float 3s ease-in-out infinite;
            border: 2px solid;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .event-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9997;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            animation: twinkle 2s infinite;
        }

        .orbit-particle {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            animation: orbit 10s linear infinite;
            box-shadow: 0 0 30px currentColor;
        }

        .rainbow-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, 
                rgba(255,0,0,0.15), rgba(255,154,0,0.15), rgba(208,222,33,0.15), 
                rgba(79,220,74,0.15), rgba(63,218,216,0.15), rgba(47,201,226,0.15), 
                rgba(28,127,238,0.15), rgba(95,21,242,0.15), rgba(186,12,248,0.15));
            animation: rainbow 3s linear infinite;
            pointer-events: none;
        }

        .snow-particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: snow linear infinite;
            box-shadow: 0 0 10px white;
        }

        /* === MODALS === */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 2em;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .close-modal {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-modal:hover {
            background: rgba(239, 68, 68, 0.4);
            transform: rotate(90deg);
        }

        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 15px;
        }

        .modal-tab {
            flex: 1;
            min-width: 100px;
